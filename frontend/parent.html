<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcademiX Parent Portal</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <header>
    <h1>Parent Portal</h1>
    <nav>
      <ul>
        <li><a href="index.html">Dashboard</a></li>
        <li><a href="#child-exams">Child's Exams</a></li>
        <li><a href="#child-results">Child's Results</a></li>
        <li><a href="#child-fees">Child's Fees</a></li>
        <li><a href="#ai-tutor">Ask AI Tutor</a></li>
        <li><a href="#notifications">Notifications</a></li>
      </ul>
    </nav>
  </header>

  <main>
    <!-- CHILD EXAMS -->
    <section id="child-exams">
      <h2>Child's Exams</h2>
      <ul id="exams-list"></ul>
    </section>

    <!-- CHILD RESULTS -->
    <section id="child-results">
      <h2>Child's Results</h2>
      <ul id="results-list"></ul>
    </section>

    <!-- CHILD FEES -->
    <section id="child-fees">
      <h2>Child's Fees</h2>
      <ul id="fees-list"></ul>
    </section>

    <!-- AI TUTOR -->
    <section id="ai-tutor">
      <h2>Ask AI Tutor About Child</h2>
      <select id="child-selector"></select>
      <form id="ai-form">
        <input type="text" id="question" placeholder="Ask a question..." required>
        <button type="submit">Ask</button>
      </form>
      <ul id="ai-responses"></ul>
    </section>

    <!-- NOTIFICATIONS -->
    <section id="notifications">
      <h2>Notifications</h2>
      <ul id="notifications-list"></ul>
    </section>
  </main>

  <script src="parent.js"></script>
</body>
</html>
