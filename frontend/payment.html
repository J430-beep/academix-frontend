<!DOCTYPE html>
<html>
<head>
    <title>Subscribe - AcademiX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            margin: 10px 0;
            border-radius: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        button {
            padding: 10px;
            width: 100%;
            margin-top: 10px;
            background: green;
            color: white;
            border: none;
            border-radius: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        .price {
            font-size: 18px;
            font-weight: bold;
        }
    </style>
</head>

<body>

<h2>Choose Subscription Plan</h2>

<div class="card">
    <h3>Basic Plan</h3>
    <p class="price">KES 1000 / month</p>
    <p>Students + Fees only</p>
    <button onclick="pay(1000)">Subscribe Basic</button>
</div>

<div class="card">
    <h3>Pro Plan</h3>
    <p class="price">KES 2500 / month</p>
    <p>Students + Fees + Results + Exams</p>
    <button onclick="pay(2500)">Subscribe Pro</button>
</div>

<div class="card">
    <h3>Premium Plan</h3>
    <p class="price">KES 5000 / month</p>
    <p>Full system + AI Tutor + Analytics</p>
    <button onclick="pay(5000)">Subscribe Premium</button>
</div>

<hr>

<h3>Payment Details</h3>

<input id="phone" placeholder="07XXXXXXXX">
<button onclick="checkPayment()">Check Payment Status</button>

<script>

const API = "https://academix-backend-pe8o.onrender.com/api";

const school_id = new URLSearchParams(window.location.search).get("school_id")
    || localStorage.getItem("school_id");

// ===============================
// SEND MPESA STK PUSH
// ===============================
async function pay(amount) {

    const phone = document.getElementById("phone").value;

    if (!phone) {
        alert("Enter phone number");
        return;
    }

    const res = await fetch(API + "/mpesa/stkpush", {
        method: "POST",
        headers: {
            "Content-Type": "application/json",
            "Authorization": "Bearer " + localStorage.getItem("token")
        },
        body: JSON.stringify({
            school_id,
            phone,
            amount
        })
    });

    const data = await res.json();

    if (data.success) {
        alert("STK Push sent. Check your phone.");
    } else {
        alert(data.error || "Payment failed");
    }
}

// ===============================
// CHECK PAYMENT STATUS (OPTIONAL UI POLLING)
// ===============================
async function checkPayment() {

    const res = await fetch(API + "/schools", {
        headers: {
            "Authorization": "Bearer " + localStorage.getItem("token")
        }
    });

    const data = await res.json();

    console.log("School data:", data);

    alert("Check admin panel after payment completes.");
}

</script>

</body>
</html>
