<!DOCTYPE html>
<html>
<head>
  <title>AcademiX Revenue Dashboard</title>
  <link rel="stylesheet" href="css/style.css">
  <style>
    body { font-family: Arial; padding: 20px; }
    .grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
    .card {
      padding: 15px;
      background: #f5f5f5;
      border-radius: 10px;
      text-align: center;
    }
    .big { font-size: 22px; font-weight: bold; }
    table { width: 100%; margin-top: 20px; border-collapse: collapse; }
    td, th { border: 1px solid #ddd; padding: 8px; }
  </style>
</head>

<body>

<h1>💰 AcademiX Revenue Dashboard</h1>

<div class="grid">
  <div class="card">
    <div>Total Schools</div>
    <div class="big" id="total">0</div>
  </div>

  <div class="card">
    <div>Active Schools</div>
    <div class="big" id="active">0</div>
  </div>

  <div class="card">
    <div>Total Revenue</div>
    <div class="big" id="revenue">0 KES</div>
  </div>

  <div class="card">
    <div>Basic Plan</div>
    <div class="big" id="basic">0</div>
  </div>

  <div class="card">
    <div>Pro Plan</div>
    <div class="big" id="pro">0</div>
  </div>

  <div class="card">
    <div>Premium Plan</div>
    <div class="big" id="premium">0</div>
  </div>
</div>

<h2>💳 Recent Payments</h2>

<table>
  <thead>
    <tr>
      <th>School ID</th>
      <th>Amount</th>
      <th>Status</th>
      <th>Receipt</th>
    </tr>
  </thead>
  <tbody id="payments"></tbody>
</table>

<script>
const API = "https://academix-backend-pe8o.onrender.com/api";

async function loadRevenue() {

  const res = await fetch(API + "/admin/revenue");
  const data = await res.json();

  document.getElementById("total").innerText = data.total_schools;
  document.getElementById("active").innerText = data.active;
  document.getElementById("revenue").innerText = data.revenue + " KES";

  document.getElementById("basic").innerText = data.plans.basic;
  document.getElementById("pro").innerText = data.plans.pro;
  document.getElementById("premium").innerText = data.plans.premium;

  const table = document.getElementById("payments");
  table.innerHTML = "";

  data.recent_payments.forEach(p => {
    table.innerHTML += `
      <tr>
        <td>${p.school_id}</td>
        <td>${p.amount}</td>
        <td>${p.status}</td>
        <td>${p.receipt || '-'}</td>
      </tr>
    `;
  });
}

loadRevenue();
setInterval(loadRevenue, 10000);
</script>

</body>
</html>
