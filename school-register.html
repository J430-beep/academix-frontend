<h2>School Registration</h2>

<link rel="stylesheet" href="css/style.css">

<input id="name" placeholder="School Name">
<input id="shortcode" placeholder="MPESA Shortcode">
<input id="passkey" placeholder="MPESA Passkey">

<!-- ✅ ADD THESE TWO (CRITICAL FIX) -->
<input id="consumer_key" placeholder="Consumer Key">
<input id="consumer_secret" placeholder="Consumer Secret">

<button id="btn" onclick="register()">Register School</button>

<p id="msg"></p>

<script>

const API = "https://academix-backend-pe8o.onrender.com/api";

async function register() {

    try {

        // ===============================
        // 1. GET VALUES
        // ===============================
        const name = document.getElementById("name").value;
        const shortcode = document.getElementById("shortcode").value;
        const passkey = document.getElementById("passkey").value;
        const consumer_key = document.getElementById("consumer_key").value;
        const consumer_secret = document.getElementById("consumer_secret").value;

        // ===============================
        // 2. VALIDATION (IMPORTANT)
        // ===============================
        if (!name || !shortcode || !passkey || !consumer_key || !consumer_secret) {
            alert("❌ Please fill all fields");
            return;
        }

        document.getElementById("msg").innerText = "Registering school...";

        // ===============================
        // 3. SEND TO BACKEND
        // ===============================
        const res = await fetch(API + "/schools/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name,
                mpesa_shortcode: shortcode,
                mpesa_passkey: passkey,
                consumer_key,
                consumer_secret
            })
        });

        const data = await res.json();
        console.log("RESPONSE:", data);

        // ===============================
        // 4. ERROR HANDLING
        // ===============================
        if (!data.school_id) {
            alert("❌ Registration failed: " + (data.error || "Unknown error"));
            return;
        }

        // ===============================
        // 5. SAVE SCHOOL ID
        // ===============================
        localStorage.setItem("school_id", data.school_id);

        // ===============================
        // 6. SHOW PASSWORD LINK
        // ===============================
        if (data.link) {
            alert("✅ School created!\n\nSet password:\n" + data.link);
        }

        // ===============================
        // 7. GO TO PAYMENT
        // ===============================
        window.location.href =
            "payment.html?school_id=" + data.school_id + "&amount=1000";

    } catch (err) {
        console.error(err);
        alert("Server error: " + err.message);
    }
}

</script>
