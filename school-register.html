<!DOCTYPE html>
<html>
<head>
    <title>Create School - AcademiX</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            margin:0;
            font-family: Arial;
            background: linear-gradient(135deg,#0d47a1,#1a73e8);
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .card {
            background:white;
            width:360px;
            padding:25px;
            border-radius:14px;
            box-shadow:0 10px 30px rgba(0,0,0,0.25);
        }

        h2 {
            text-align:center;
            color:#1a73e8;
        }

        input {
            width:100%;
            padding:12px;
            margin:8px 0;
            border:1px solid #ddd;
            border-radius:8px;
        }

        button {
            width:100%;
            padding:12px;
            margin-top:10px;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-weight:bold;
        }

        .register-btn {
            background:#1a73e8;
            color:white;
        }

        .login-btn {
            background:white;
            border:2px solid #1a73e8;
            color:#1a73e8;
        }

        #msg {
            text-align:center;
            font-size:13px;
            margin-top:10px;
        }
    </style>
</head>

<body>

<div class="card">

<h2>Create Your School</h2>

<input id="name" placeholder="School Name">
<input id="email" placeholder="Admin Email">
<input id="password" type="password" placeholder="Create Password">

<button class="register-btn" onclick="register()">Create School</button>

<button class="login-btn" onclick="goLogin()">Already have account? Login</button>

<p id="msg"></p>

</div>

<script>

const API = "https://academix-backend-pe8o.onrender.com/api";

function goLogin(){
    window.location.href = "login.html";
}

async function register(){

    const msg = document.getElementById("msg");

    const name = document.getElementById("name").value.trim();
    const email = document.getElementById("email").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!name || !email || !password){
        msg.innerText = "Fill all fields";
        msg.style.color = "red";
        return;
    }

    try{

        const res = await fetch(API + "/schools/register-simple", {
            method:"POST",
            headers:{"Content-Type":"application/json"},
            body: JSON.stringify({
                name,
                email,
                password
            })
        });

        const data = await res.json();

        if(!res.ok) throw new Error(data.error);

        msg.innerText = "Account created ✔ Redirecting...";
        msg.style.color = "green";

        setTimeout(()=>{
            window.location.href = "login.html";
        },1000);

    }catch(err){
        msg.innerText = err.message;
        msg.style.color = "red";
    }
}

</script>

</body>
</html>
