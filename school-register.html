<h2>School Registration</h2>

<link rel="stylesheet" href="css/style.css">

<input id="name" placeholder="School Name">
<input id="shortcode" placeholder="MPESA Shortcode">
<input id="passkey" placeholder="MPESA Passkey">

<button id="btn" onclick="register()">Register School</button>

<p id="msg"></p>

<script>

const API = "https://academix-backend-pe8o.onrender.com/api";

async function register() {

    try {

        // 1. GET INPUT VALUES
        const name = document.getElementById("name").value;
        const shortcode = document.getElementById("shortcode").value;
        const passkey = document.getElementById("passkey").value;

        // 2. SEND TO BACKEND
        const res = await fetch(API + "/schools/register", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
                name: name,
                mpesa_shortcode: shortcode,
                mpesa_passkey: passkey
            })
        });

        const data = await res.json();

        console.log("RESPONSE:", data);

        // 3. CHECK IF SUCCESS
        if (!data.school_id) {
            alert("Registration failed: " + (data.error || "Unknown error"));
            return;
        }

        // 4. SAVE SCHOOL ID
        localStorage.setItem("school_id", data.school_id);

        // 5. SHOW PASSWORD LINK (IMPORTANT)
        if (data.link) {
            alert("Set your password using this link:\n\n" + data.link);
        }

        // 6. GO TO PAYMENT PAGE
        window.location.href =
            "payment.html?school_id=" + data.school_id + "&amount=1000";

    } catch (err) {
        console.error(err);
        alert("Server error");
    }
}

</script>
