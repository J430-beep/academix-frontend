<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AcademiX Parent Portal</title>


<style>

body{
font-family:Arial;
margin:0;
background:#f4f6f9;
}


header{

background:#1e2a38;
color:white;
padding:15px;

}


nav ul{

display:flex;
gap:15px;
list-style:none;
padding:0;
flex-wrap:wrap;

}


nav a{

color:white;
text-decoration:none;

}



main{

padding:20px;
display:grid;
gap:20px;

}



section{

background:white;
padding:15px;
border-radius:10px;
box-shadow:0 2px 6px #0002;

}



select,input{

width:100%;
padding:10px;
margin:8px 0;

}


button{

padding:10px;
background:#1a73e8;
color:white;
border:none;
border-radius:6px;

}



.badge{

background:red;
border-radius:50%;
padding:4px 8px;

}



</style>


</head>



<body>



<header>


<h1>
👨‍👩‍👧 Parent Portal
</h1>


<nav>

<ul>

<li>
<a href="#child-exams">
Exams
</a>
</li>


<li>
<a href="#child-results">
Results
</a>
</li>


<li>
<a href="#child-fees">
Fees
</a>
</li>


<li>
<a href="#ai-tutor">
AI Tutor
</a>
</li>


<li>
<a href="#notifications">
Notifications
<span id="notifBadge" class="badge">0</span>
</a>
</li>


</ul>

</nav>


</header>





<main>




<section>

<h2>
👶 My Children
</h2>


<select id="child-selector">

<option>
Loading...
</option>


</select>


</section>






<section id="child-exams">


<h2>
📘 Exams
</h2>


<ul id="exams-list"></ul>


</section>







<section id="child-results">


<h2>
📊 Results
</h2>


<ul id="results-list"></ul>


</section>







<section id="child-fees">


<h2>
💰 Fees
</h2>


<ul id="fees-list"></ul>


</section>







<section id="ai-tutor">


<h2>
🤖 AI Tutor
</h2>


<form id="ai-form">


<input 
id="question"
placeholder="Ask about your child"
required>


<button>
Ask
</button>


</form>


<ul id="ai-responses"></ul>


</section>







<section id="notifications">


<h2>
🔔 Notifications
</h2>


<ul id="notifications-list"></ul>


</section>





</main>





<script>


const token =
localStorage.getItem("token");



if(!token){

window.location.href="login.html";

}




</script>



<script src="parent.js"></script>



</body>

</html>
