<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AcademiX Parent Portal</title>
  <link rel="stylesheet" href="css/style.css">

  <style>
    body { font-family: Arial; margin: 0; background: #f4f6f9; }

    header {
      background: #1e2a38;
      color: white;
      padding: 15px;
    }

    nav ul {
      display: flex;
      gap: 15px;
      list-style: none;
      padding: 0;
    }

    nav a { color: white; text-decoration: none; }

    main {
      padding: 20px;
      display: grid;
      gap: 20px;
    }

    section {
      background: white;
      padding: 15px;
      border-radius: 10px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.1);
    }

    #child-selector {
      padding: 8px;
      width: 100%;
      margin-bottom: 10px;
    }

    ul { padding-left: 20px; }

    .badge {
      background: red;
      color: white;
      border-radius: 50%;
      padding: 3px 7px;
      font-size: 12px;
    }
  </style>
</head>

<body>

<header>
  <h1>👨‍👩‍👧 Parent Portal</h1>
  <nav>
    <ul>
      <li><a href="#child-exams">Exams</a></li>
      <li><a href="#child-results">Results</a></li>
      <li><a href="#child-fees">Fees</a></li>
      <li><a href="#ai-tutor">AI Tutor</a></li>
      <li><a href="#notifications">Notifications <span id="notifBadge" class="badge">0</span></a></li>
    </ul>
  </nav>
</header>

<main>

  <!-- CHILD SELECT -->
  <section>
    <h2>👶 Select Child</h2>
    <select id="child-selector"></select>
  </section>

  <!-- EXAMS -->
  <section id="child-exams">
    <h2>📘 Exams</h2>
    <ul id="exams-list"></ul>
  </section>

  <!-- RESULTS -->
  <section id="child-results">
    <h2>📊 Results</h2>
    <ul id="results-list"></ul>
  </section>

  <!-- FEES -->
  <section id="child-fees">
    <h2>💰 Fees</h2>
    <ul id="fees-list"></ul>
  </section>

  <!-- AI TUTOR -->
  <section id="ai-tutor">
    <h2>🤖 AI Tutor</h2>

    <form id="ai-form">
      <input type="text" id="question" placeholder="Ask about your child..." required>
      <button type="submit">Ask</button>
    </form>

    <ul id="ai-responses"></ul>
  </section>

  <!-- NOTIFICATIONS -->
  <section id="notifications">
    <h2>🔔 Notifications</h2>
    <ul id="notifications-list"></ul>
  </section>

</main>

<script src="parent.js"></script>
</body>
</html>
