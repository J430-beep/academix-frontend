<!DOCTYPE html>
<html>
<head>
  <title>AcademiX Login</title>
  <link rel="stylesheet" href="css/style.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body style="font-family:Arial; text-align:center; padding:50px;">

  <h2>School Login</h2>

  <input id="email" placeholder="Email" style="padding:10px; width:250px;"><br><br>
  <input id="password" type="password" placeholder="Password" style="padding:10px; width:250px;"><br><br>

  <button onclick="login()" style="padding:10px 20px;">Login</button>

  <p id="msg"></p>

<script>
const API = "https://academix-backend-pe8o.onrender.com/api";

async function login() {

  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  const res = await fetch(API + "/auth/login", {
    method: "POST",
    headers: {"Content-Type": "application/json"},
    body: JSON.stringify({ email, password })
  });

  const data = await res.json();

  if (data.token) {

    localStorage.setItem("token", data.token);
    localStorage.setItem("school_id", data.school_id);

    document.getElementById("msg").innerText = "Login successful!";

    window.location.href = "admin.html";

  } else {
    document.getElementById("msg").innerText = data.error || "Login failed";
  }
}
</script>

</body>
</html>
