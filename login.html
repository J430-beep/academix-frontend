<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AcademiX Secure Login</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background: linear-gradient(135deg,#0d47a1,#1a73e8);
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card {
    background:white;
    width:360px;
    padding:25px;
    border-radius:14px;
    box-shadow:0 10px 30px rgba(0,0,0,0.25);
}

h2 {
    text-align:center;
    color:#1a73e8;
}

input {
    width:100%;
    padding:12px;
    margin:8px 0;
    border:1px solid #ddd;
    border-radius:8px;
    outline:none;
}

button {
    width:100%;
    padding:12px;
    border:none;
    background:#1a73e8;
    color:white;
    border-radius:8px;
    cursor:pointer;
    font-weight:bold;
}

button:disabled {
    background:gray;
}

#otpBox {
    display:none;
}

#msg {
    text-align:center;
    font-size:13px;
    margin-top:10px;
}
</style>
</head>

<body>

<div class="card">

<h2>AcademiX Login</h2>

<!-- STEP 1 -->
<div id="loginBox">
    <input id="school_code" placeholder="School Code">
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">

    <button id="loginBtn" onclick="requestOTP()">Send OTP</button>
</div>

<!-- STEP 2 -->
<div id="otpBox">
    <input id="otp" placeholder="Enter OTP">
    <button onclick="verifyOTP()">Verify Login</button>
</div>

<p id="msg"></p>

</div>

<script>

const API = "https://academix-backend-pe8o.onrender.com/api";

let temp_token = null;

/* =========================
   STEP 1: REQUEST OTP
========================= */
async function requestOTP() {

    const school_code = document.getElementById("school_code").value;
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const btn = document.getElementById("loginBtn");
    const msg = document.getElementById("msg");

    if (!school_code || !email || !password) {
        msg.innerText = "All fields required";
        msg.style.color = "red";
        return;
    }

    btn.disabled = true;
    btn.innerText = "Sending OTP...";

    try {
        const res = await fetch(API + "/auth/request-otp", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                school_code,
                email,
                password
            })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Failed");

        temp_token = data.temp_token;

        msg.innerText = "OTP sent successfully";
        msg.style.color = "green";

        document.getElementById("loginBox").style.display = "none";
        document.getElementById("otpBox").style.display = "block";

    } catch (err) {
        msg.innerText = err.message;
        msg.style.color = "red";

    } finally {
        btn.disabled = false;
        btn.innerText = "Send OTP";
    }
}

/* =========================
   STEP 2: VERIFY OTP
========================= */
async function verifyOTP() {

    const otp = document.getElementById("otp").value;
    const msg = document.getElementById("msg");

    if (!otp) {
        msg.innerText = "Enter OTP";
        msg.style.color = "red";
        return;
    }

    try {
        const res = await fetch(API + "/auth/verify-otp", {
            method: "POST",
            headers: {"Content-Type":"application/json"},
            body: JSON.stringify({
                temp_token,
                otp
            })
        });

        const data = await res.json();

        if (!res.ok) throw new Error(data.error || "Invalid OTP");

        // STORE SESSION (SaaS SAFE)
        localStorage.setItem("token", data.token);
        localStorage.setItem("school_id", data.school_id);
        localStorage.setItem("role", data.role);

        msg.innerText = "Login successful ✔";
        msg.style.color = "green";

        setTimeout(() => {

            if (data.role === "admin") {
                window.location.href = "admin.html";
            } else if (data.role === "teacher") {
                window.location.href = "teacher.html";
            } else {
                window.location.href = "student.html";
            }

        }, 1000);

    } catch (err) {
        msg.innerText = err.message;
        msg.style.color = "red";
    }
}

</script>

</body>
</html>
