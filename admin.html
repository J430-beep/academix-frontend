<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AcademiX Admin</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Segoe UI,Arial;
}

body{
display:flex;
background:#f4f6f9;
}

.sidebar{
width:240px;
height:100vh;
background:#111827;
color:white;
padding:20px;
}

.sidebar h2{
margin-bottom:20px;
}

.sidebar a{
display:block;
padding:10px;
color:#bbb;
text-decoration:none;
border-radius:6px;
}

.sidebar a:hover{
background:#1f2937;
color:white;
}


.main{
flex:1;
padding:20px;
}


.header{
display:flex;
justify-content:space-between;
margin-bottom:20px;
}


.card{
background:white;
padding:15px;
border-radius:10px;
margin-bottom:20px;
box-shadow:0 2px 6px #ddd;
}


.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}


input{
width:100%;
padding:10px;
margin:5px 0;
border:1px solid #ddd;
border-radius:6px;
}


button{
padding:10px;
background:#1a73e8;
color:white;
border:0;
border-radius:6px;
cursor:pointer;
}


.list{
margin-top:10px;
}


.item{
padding:8px;
border-bottom:1px solid #eee;
}


.state{
padding:10px;
color:#777;
}


#toast{
position:fixed;
bottom:20px;
right:20px;
background:#111;
color:white;
padding:10px;
border-radius:6px;
display:none;
}

</style>

</head>


<body>


<div class="sidebar">

<h2>AcademiX</h2>

<a href="#students">Students</a>
<a href="#teachers">Teachers</a>
<a href="#fees">Fees</a>
<a href="#exams">Exams</a>
<a href="#results">Results</a>
<a href="#ai">AI</a>

</div>



<div class="main">


<div class="header">

<h2>Admin Dashboard</h2>

<div id="user-bar">
Loading...
</div>

</div>





<div class="card" id="students">

<h3>Students</h3>

<div class="grid">

<div>

<input id="student-name" placeholder="Student name">

<input id="student-class" placeholder="Class ID">

<button onclick="addStudent()">
Save
</button>

</div>


<div>

<input id="view-student-class" placeholder="Class ID">

<button onclick="viewStudents()">
View
</button>


<div id="students-list" class="list"></div>

</div>


</div>

</div>







<div class="card" id="teachers">


<h3>Teachers</h3>


<div class="grid">


<div>

<input id="teacher-name" placeholder="Full name">

<input id="teacher-phone" placeholder="Phone">

<input id="teacher-subject" placeholder="Subject ID">


<button onclick="addTeacher()">
Save
</button>


</div>



<div>

<input id="view-teacher-subject" placeholder="Subject ID">


<button onclick="viewTeachers()">
View
</button>


<div id="teachers-list" class="list"></div>


</div>


</div>

</div>







<div class="card" id="fees">


<h3>Fees</h3>


<div class="grid">


<div>


<input id="fee-student" placeholder="Student ID">


<input id="fee-amount" placeholder="Amount">


<button onclick="addFee()">
Save
</button>


</div>



<div>

<input id="view-fee-student" placeholder="Student ID">


<button onclick="viewFees()">
View
</button>


<div id="fees-list" class="list"></div>


</div>


</div>


</div>








<div class="card" id="exams">


<h3>Exams</h3>


<div class="grid">


<div>


<input id="exam-title" placeholder="Exam name">


<input id="exam-class" placeholder="Class ID">


<input id="exam-subject" placeholder="Subject ID">


<input id="exam-date" type="date">


<input id="exam-syllabus" placeholder="Syllabus">


<button onclick="addExam()">
Save
</button>


</div>



<div>


<input id="view-exam-class" placeholder="Class ID">


<button onclick="viewExams()">
View
</button>


<div id="exams-list" class="list"></div>


</div>


</div>


</div>








<div class="card" id="results">


<h3>Results</h3>


<div class="grid">


<div>


<input id="result-student" placeholder="Student ID">


<input id="result-exam" placeholder="Exam ID">


<input id="result-subject" placeholder="Subject ID">


<input id="result-marks" placeholder="Marks">


<input id="result-total" placeholder="Total marks">


<button onclick="addResult()">
Save
</button>


</div>



<div>


<input id="view-result-class" placeholder="Class ID">


<button onclick="viewResults()">
View
</button>


<div id="results-list" class="list"></div>


</div>


</div>


</div>








<div class="card" id="ai">

<h3>AI Analytics</h3>


<input id="ai-class" placeholder="Class ID">

<button onclick="fetchClassAnalytics()">
Class AI
</button>


<input id="ai-subject" placeholder="Subject ID">

<button onclick="fetchSubjectAnalytics()">
Subject AI
</button>


<div id="analytics-results" class="state"></div>


</div>





</div>



<div id="toast"></div>



<script>


const API =
"https://academix-backend-pe8o.onrender.com/api";


const token =
localStorage.getItem("token");


if(!token){

window.location.href="login.html";

}



async function loadUser(){

try{

const res =
await fetch(API+"/me",
{
headers:{
Authorization:"Bearer "+token
}
});


const user =
await res.json();


document.getElementById("user-bar")
.innerText =
user.name+" ("+user.plan+")";


}catch(e){

document.getElementById("user-bar")
.innerText="Admin";

}

}


loadUser();


</script>



<script src="admin.js"></script>


</body>
</html>
